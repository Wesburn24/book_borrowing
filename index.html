<!DOCTYPE html>
<html>
<head>
    <title>Library System</title>
</head>
<body>
    <h1>Library System</h1>

    <h2>Add Book</h2>
    <form action="/add_book" method="POST">
        <input name="isbn" placeholder="ISBN"><br>
        <input name="title" placeholder="Title"><br>
        <input name="author" placeholder="Author"><br>
        <button type="submit">Add Book</button>
    </form>

    <h2>Add Member</h2>
    <form action="/add_member" method="POST">
        <input name="member_id" placeholder="Member ID"><br>
        <input name="name" placeholder="Name"><br>
        <input name="email" placeholder="Email"><br>
        <button type="submit">Add Member</button>
    </form>

    <h2>Books</h2>
    {% for book in books.values() %}
        <p>{{ book.title }} by {{ book.author }} — {{ book.status.value }}</p>
    {% endfor %}

    <h2>Members</h2>
    {% for member in members.values() %}
        <p>{{ member.name }} — {{ member.email }}</p>
    {% endfor %}
</body>
</html>
